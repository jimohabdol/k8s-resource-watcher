apiVersion: v1
kind: ConfigMap
metadata:
  name: resource-watcher-config
  namespace: default
data:
  config.yaml: |
    clusterName: "test-cluster"

    # Watcher configuration
    watcher:
      watchTimeoutSeconds: 180
      maxReconnects: 3
      reconnectBackoffMs: 3000
      heartbeatIntervalMs: 15000
      keepAliveEnabled: true
      
      # Advanced optimizations
      eventBatchIntervalMs: 2000
      eventBufferSize: 200
      maxConcurrentWatches: 10
      resourceVersionTTL: 3600
      notificationCooldown: 15
      maxBatchSize: 100
      cleanupInterval: 300
      
      # Deployment monitoring configuration
      deploymentImportantFields:
        - "containers"
        - "volumes"
        - "serviceAccountName"
        - "nodeSelector"
        - "affinity"
        - "tolerations"
        - "securityContext"
        - "imagePullSecrets"
        - "hostAliases"

    resources:
      # Watch all Deployments in the default namespace
      - kind: Deployment
        namespace: default
      
      # Watch all ConfigMaps in the default namespace
      - kind: ConfigMap
        namespace: default
      
      # Watch all Secrets in the default namespace
      - kind: Secret
        namespace: default
      
      # Watch all Ingresses in the default namespace
      - kind: Ingress
        namespace: default

    email:
      smtpHost: ""
      smtpPort: 587
      useAuth: false
      smtpUsername: ""
      smtpPassword: ""
      fromEmail: ""
      toEmails: [] 