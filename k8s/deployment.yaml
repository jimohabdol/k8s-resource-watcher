apiVersion: apps/v1
kind: Deployment
metadata:
  name: resource-watcher
  namespace: default
  labels:
    app: resource-watcher
spec:
  replicas: 1
  selector:
    matchLabels:
      app: resource-watcher
  template:
    metadata:
      labels:
        app: resource-watcher
      annotations:
        openshift.io/scc: restricted
    spec:
      serviceAccountName: resource-watcher
      # Pod-level security context (inherited by all containers)
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 2000
      containers:
      - name: resource-watcher
        image: resource-watcher:1.0.0
        imagePullPolicy: IfNotPresent
        # Container-specific security context (only essential settings)
        securityContext:
          allowPrivilegeEscalation: false
          capabilities:
            drop: ["ALL"]
        env:
        - name: CLUSTER_NAME
          valueFrom:
            configMapKeyRef:
              name: resource-watcher-config
              key: clusterName
        - name: SMTP_HOST
          value: "smtp.gmail.com"
        - name: SMTP_PORT
          value: "587"
        - name: SMTP_USERNAME
          valueFrom:
            secretKeyRef:
              name: resource-watcher-email-config
              key: smtp-username
        - name: SMTP_PASSWORD
          valueFrom:
            secretKeyRef:
              name: resource-watcher-email-config
              key: smtp-password
        - name: FROM_EMAIL
          valueFrom:
            secretKeyRef:
              name: resource-watcher-email-config
              key: from-email
        - name: TO_EMAIL
          valueFrom:
            secretKeyRef:
              name: resource-watcher-email-config
              key: to-email
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        volumeMounts:
        - name: config
          mountPath: /app/config.yaml
          subPath: config.yaml
          readOnly: true
        - name: secrets
          mountPath: /etc/resource-watcher/secrets
          readOnly: true
        - name: tmp
          mountPath: /tmp
        livenessProbe:
          httpGet:
            path: /healthz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: http
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 5
      volumes:
      - name: config
        configMap:
          name: resource-watcher-config
      - name: secrets
        secret:
          secretName: resource-watcher-email-config
      - name: tmp
        emptyDir: {}
---
# Add NetworkPolicy to restrict traffic
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: resource-watcher
  namespace: default
spec:
  podSelector:
    matchLabels:
      app: resource-watcher
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - ports:
    - port: 8080
      protocol: TCP
  egress:
  - ports:
    - port: 587
      protocol: TCP  # SMTP
    - port: 443
      protocol: TCP  # HTTPS for K8s API
    - port: 53
      protocol: UDP  # DNS
    - port: 53
      protocol: TCP  # DNS 